<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="55%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#13263D"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ED8B00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ED8B00" stop-opacity="0"/>
    </linearGradient>
    <style>
      .mono { font-family: 'Courier New', Consolas, monospace; }
      .sans { font-family: 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="600" height="300" fill="url(#glow)"/>

  <!-- faint grid dots, subtle texture -->
  <g opacity="0.08">
    <circle cx="1050" cy="60" r="2" fill="#6DB33F"/>
    <circle cx="1100" cy="110" r="2" fill="#4479A1"/>
    <circle cx="980" cy="150" r="2" fill="#ED8B00"/>
    <circle cx="1140" cy="200" r="2" fill="#61DAFB"/>
    <circle cx="1020" cy="240" r="2" fill="#47A248"/>
  </g>

  <!-- terminal window -->
  <rect x="40" y="35" width="1120" height="230" rx="14" fill="#0F1F33" stroke="#22364D" stroke-width="1.5"/>

  <!-- terminal top bar -->
  <rect x="40" y="35" width="1120" height="34" rx="14" fill="#132A42"/>
  <rect x="40" y="55" width="1120" height="14" fill="#132A42"/>
  <circle cx="65" cy="52" r="6" fill="#FF5F56"/>
  <circle cx="86" cy="52" r="6" fill="#FFBD2E"/>
  <circle cx="107" cy="52" r="6" fill="#27C93F"/>
  <text x="600" y="57" text-anchor="middle" class="mono" font-size="13" fill="#5C7595">piyush@backend:~</text>

  <!-- prompt line -->
  <text x="70" y="115" class="mono" font-size="20" fill="#6DB33F">piyush@dev</text>
  <text x="215" y="115" class="mono" font-size="20" fill="#5C7595">:~$ whoami</text>

  <!-- name -->
  <text x="70" y="155" class="mono" font-size="24" fill="#E8EEF5" font-weight="bold">Piyush Raghav</text>

  <!-- big headline -->
  <text x="70" y="200" class="mono" font-size="42" fill="#ED8B00" font-weight="bold">JAVA BACKEND DEVELOPER</text>
  <rect x="732" y="180" width="14" height="34" fill="#ED8B00">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- tagline -->
  <text x="70" y="228" class="sans" font-size="15" fill="#8CA3BD">Building secure, scalable APIs with the Spring ecosystem</text>

  <!-- tech badges row -->
  <g class="sans" font-size="14" font-weight="bold">
    <rect x="70" y="242" width="62" height="26" rx="13" fill="#ED8B00"/>
    <text x="101" y="259" text-anchor="middle" fill="#0A1628">Java</text>

    <rect x="140" y="242" width="112" height="26" rx="13" fill="#6DB33F"/>
    <text x="196" y="259" text-anchor="middle" fill="#0A1628">Spring Boot</text>

    <rect x="260" y="242" width="132" height="26" rx="13" fill="#6DB33F"/>
    <text x="326" y="259" text-anchor="middle" fill="#0A1628">Spring Security</text>

    <rect x="400" y="242" width="92" height="26" rx="13" fill="#59666C"/>
    <text x="446" y="259" text-anchor="middle" fill="#FFFFFF">Hibernate</text>

    <rect x="500" y="242" width="78" height="26" rx="13" fill="#4479A1"/>
    <text x="539" y="259" text-anchor="middle" fill="#FFFFFF">MySQL</text>

    <rect x="586" y="242" width="98" height="26" rx="13" fill="#47A248"/>
    <text x="635" y="259" text-anchor="middle" fill="#FFFFFF">MongoDB</text>

    <rect x="692" y="242" width="62" height="26" rx="13" fill="#FB015B"/>
    <text x="723" y="259" text-anchor="middle" fill="#FFFFFF">JWT</text>

    <rect x="762" y="242" width="72" height="26" rx="13" fill="#61DAFB"/>
    <text x="798" y="259" text-anchor="middle" fill="#0A1628">React</text>
  </g>
</svg>
